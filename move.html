<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KADEX | Detalhes do Movimento</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pokedex: {
                            red: '#E3350D',
                            'red-dark': '#B32506',
                            'red-light': '#FF5A35',
                        },
                        glass: {
                            white: 'rgba(255, 255, 255, 0.7)',
                            border: 'rgba(255, 255, 255, 0.5)',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    backdropBlur: {
                        xs: '2px',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/types.css">

    <style type="text/tailwindcss">
        @layer components {
            .glass-panel {
                @apply bg-white/70 backdrop-blur-md border border-white/50 shadow-xl rounded-3xl;
            }
            .btn-pokedex {
                @apply bg-pokedex-red hover:bg-pokedex-red-dark text-white font-bold py-3 px-8 rounded-2xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-pokedex-red/30 disabled:opacity-50 disabled:cursor-not-allowed;
            }
            .input-pokedex {
                @apply bg-white/80 border-2 border-transparent focus:border-pokedex-red focus:bg-white outline-none rounded-2xl px-6 py-3 w-full transition-all duration-300 shadow-inner;
            }
            .stat-bar-bg {
                @apply h-2.5 w-full bg-gray-100 rounded-full overflow-hidden;
            }
            .stat-bar-fill {
                @apply h-full transition-all duration-1000 ease-out rounded-full;
            }
            .aba-movimento {
                @apply px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-300;
            }
            .aba-movimento.ativa {
                @apply bg-pokedex-red text-white shadow-md shadow-pokedex-red/20;
            }
            .aba-movimento:not(.ativa) {
                @apply bg-gray-100 text-gray-600 hover:bg-gray-200;
            }
            /* Componentes compartilhados */
            .stat-card {
                @apply p-6 rounded-3xl bg-gray-50/50 border border-gray-100 flex flex-col items-center justify-center text-center;
            }
            .tab-btn {
                @apply px-4 py-2 rounded-xl text-xs font-bold transition-all duration-300 transform hover:scale-105;
            }
            .tab-btn.ativa {
                @apply bg-pokedex-red text-white shadow-lg shadow-pokedex-red/20;
            }
            .tab-btn:not(.ativa) {
                @apply bg-white text-gray-400 hover:text-gray-600 border border-gray-100;
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen selection:bg-pokedex-red/20 selection:text-pokedex-red">

    <!-- Header background element -->
    <div class="fixed top-0 left-0 w-full h-[400px] bg-gradient-to-b from-pokedex-red/10 to-transparent -z-10 pointer-events-none"></div>

    <div class="max-w-6xl mx-auto px-4">
        <header></header>

        <main class="space-y-12">
            <!-- Skeleton Loader -->
            <section id="esqueletoMove" class="animate-pulse space-y-8">
                <div class="glass-panel p-8 md:p-12 space-y-8">
                    <div class="flex flex-col lg:flex-row gap-12 items-stretch">
                        <div class="flex-grow space-y-8">
                            <div class="flex flex-col md:flex-row gap-8 items-center md:items-start">
                                <div class="w-32 h-32 bg-gray-200 rounded-3xl flex-shrink-0"></div>
                                <div class="flex-grow space-y-4 w-full">
                                    <div class="h-12 bg-gray-200 rounded-xl w-3/4 mx-auto md:mx-0"></div>
                                    <div class="flex gap-2 justify-center md:justify-start">
                                        <div class="h-8 bg-gray-200 rounded-full w-24"></div>
                                        <div class="h-8 bg-gray-200 rounded-full w-24"></div>
                                        <div class="h-8 bg-gray-200 rounded-full w-24"></div>
                                    </div>
                                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                                </div>
                            </div>
                        </div>
                        <div class="lg:w-80 grid grid-cols-2 gap-3">
                            <div class="h-24 bg-gray-200 rounded-3xl"></div>
                            <div class="h-24 bg-gray-200 rounded-3xl"></div>
                            <div class="h-24 bg-gray-200 rounded-3xl"></div>
                            <div class="h-24 bg-gray-200 rounded-3xl"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Move Content -->
            <section id="conteudoMove" class="hidden space-y-12">
                <!-- Hero Card -->
                <div class="glass-panel p-8 md:p-12 overflow-hidden relative">
                    <!-- Subtle Background Accent (Type based) -->
                    <div id="moveBgAccent" class="absolute -top-24 -right-24 w-96 h-96 rounded-full blur-[100px] opacity-10 pointer-events-none transition-all duration-1000"></div>

                    <div class="flex flex-col lg:flex-row gap-12 items-stretch">
                        <!-- Left Column: Primary Info -->
                        <div class="flex-grow space-y-8">
                            <div class="flex flex-col md:flex-row gap-8 items-center md:items-start">
                                <!-- Icon Area -->
                                <div id="moveIconContainer" class="relative w-32 h-32 flex-shrink-0 flex items-center justify-center rounded-3xl shadow-inner border border-white/50 overflow-hidden bg-white/50">
                                    <div id="moveIconBg" class="absolute inset-0 opacity-10"></div>
                                    <img id="moveIconImg" src="" alt="" class="relative z-10 w-20 h-20 object-contain drop-shadow-xl transition-transform duration-500 hover:scale-110">
                                </div>

                                <div class="flex-grow text-center md:text-left space-y-4">
                                    <div class="flex flex-col md:flex-row md:items-baseline gap-2 justify-center md:justify-start">
                                        <h2 id="moveNome" class="text-5xl md:text-6xl font-black tracking-tighter capitalize text-gray-900 leading-none"></h2>
                                        <span id="moveID" class="text-xl font-bold text-gray-300 tracking-widest"></span>
                                    </div>
                                    
                                    <div class="flex flex-wrap gap-3 justify-center md:justify-start items-center">
                                        <a id="moveTipo" class="tipo-badge"></a>
                                        <span id="moveCategoria" class="cat-badge"></span>
                                        <span id="moveGeracaoBadge" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-gray-100 text-gray-400 border border-white shadow-sm"></span>
                                    </div>

                                    <p id="moveDescricaoCurta" class="text-gray-500 font-medium leading-relaxed text-base max-w-xl italic line-clamp-2 md:line-clamp-none"></p>
                                </div>
                            </div>
                        </div>

                        <!-- Right Column: Metadata Grid (Compact) -->
                        <div class="lg:w-80 flex-shrink-0">
                            <div class="grid grid-cols-2 gap-3 h-full">
                                <!-- Power -->
                                <div class="meta-card-highlight group">
                                    <div class="flex items-center gap-2 mb-2">
                                        <svg class="w-3.5 h-3.5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                        <span class="text-[9px] uppercase font-bold text-gray-400 tracking-widest">Poder</span>
                                    </div>
                                    <span id="movePoder" class="text-2xl font-black text-gray-700"></span>
                                </div>
                                <!-- Accuracy -->
                                <div class="meta-card-highlight group">
                                    <div class="flex items-center gap-2 mb-2">
                                        <svg class="w-3.5 h-3.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        <span class="text-[9px] uppercase font-bold text-gray-400 tracking-widest">Precisão</span>
                                    </div>
                                    <span id="movePrecisao" class="text-2xl font-black text-gray-700"></span>
                                </div>
                                <!-- PP -->
                                <div class="meta-card-highlight group">
                                    <div class="flex items-center gap-2 mb-2">
                                        <svg class="w-3.5 h-3.5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.691.34a2 2 0 01-1.782 0l-.691-.34a6 6 0 00-3.86-.517l-2.388.477a2 2 0 00-1.022.547l-1.16 1.16a2 2 0 000 2.828l1.16 1.16a2 2 0 001.022.547l2.387.477a6 6 0 003.86-.517l.691-.34a2 2 0 011.782 0l.691.34a6 6 0 003.86.517l2.388-.477a2 2 0 001.022-.547l1.16-1.16a2 2 0 000-2.828l-1.16-1.16z"></path></svg>
                                        <span class="text-[9px] uppercase font-bold text-gray-400 tracking-widest">PP</span>
                                    </div>
                                    <span id="movePP" class="text-2xl font-black text-gray-700"></span>
                                </div>
                                <!-- Priority -->
                                <div class="meta-card-highlight group">
                                    <div class="flex items-center gap-2 mb-2">
                                        <svg class="w-3.5 h-3.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        <span class="text-[9px] uppercase font-bold text-gray-400 tracking-widest">Prioridade</span>
                                    </div>
                                    <span id="movePrioridade" class="text-2xl font-black text-gray-700"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Technical Details -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Descriptions -->
                    <div class="lg:col-span-2 space-y-8">
                        <div class="glass-panel p-8">
                            <h4 class="text-xl font-extrabold mb-6 flex items-center gap-2 text-gray-800">
                                <span class="w-1.5 h-6 bg-pokedex-red rounded-full"></span>
                                Descrição e Efeito
                            </h4>
                            <p id="moveDescricao" class="text-gray-500 font-medium leading-relaxed text-lg italic"></p>
                            <div id="moveEfeitoDetalhado" class="mt-8 p-6 bg-gray-50/50 rounded-2xl border border-gray-100 text-sm text-gray-600 leading-relaxed"></div>
                        </div>

                        <!-- Secondary Info Cards -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="glass-panel p-8">
                                <h4 class="text-lg font-extrabold mb-4 text-gray-800">Efeitos de Status</h4>
                                <div id="moveAilment" class="flex items-center gap-3">
                                    <div class="w-12 h-12 bg-gray-100 rounded-2xl flex items-center justify-center">
                                        <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                    </div>
                                    <div>
                                        <span id="moveAilmentNome" class="block font-extrabold text-gray-700 capitalize">Nenhum</span>
                                        <span id="moveAilmentChance" class="text-xs font-bold text-gray-400">0% de chance</span>
                                    </div>
                                </div>
                            </div>
                            <div class="glass-panel p-8">
                                <h4 class="text-lg font-extrabold mb-4 text-gray-800">Lançamento</h4>
                                <div class="space-y-3">
                                    <div class="flex justify-between items-center text-sm">
                                        <span class="font-bold text-gray-400">Geração</span>
                                        <span id="moveGeracao" class="font-extrabold text-gray-700 uppercase"></span>
                                    </div>
                                    <div id="moveTMContainer" class="flex justify-between items-center text-sm hidden">
                                        <span class="font-bold text-gray-400">TM/HM</span>
                                        <span id="moveTM" class="font-extrabold text-pokedex-red"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Meta Data -->
                    <div class="glass-panel p-8">
                        <h4 class="text-xl font-extrabold mb-6 flex items-center gap-2 text-gray-800">
                            <span class="w-1.5 h-6 bg-pokedex-red rounded-full"></span>
                            Dados Técnicos
                        </h4>
                        <div id="moveMetaContainer" class="space-y-4"></div>
                    </div>
                </div>

                <!-- Learned By Section -->
                <div class="glass-panel p-8 md:p-12">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                        <h4 class="text-2xl font-extrabold flex items-center gap-2 text-gray-800">
                            <span class="w-2 h-8 bg-pokedex-red rounded-full"></span>
                            Pokémon que Aprendem
                        </h4>
                        <div id="abasLearnedBy" class="flex bg-gray-100/50 p-1.5 rounded-2xl gap-1 overflow-x-auto">
                            <button class="tab-btn ativa" data-method="level-up">Nível</button>
                            <button class="tab-btn" data-method="machine">TM / HM</button>
                            <button class="tab-btn" data-method="egg">Ovo</button>
                            <button class="tab-btn" data-method="tutor">Tutor</button>
                            <button class="tab-btn" data-method="evolution">Evolução</button>
                        </div>
                    </div>

                    <!-- Pokémon Grid -->
                    <div id="learnedByGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>

                    <!-- Load More Area -->
                    <div id="loadMoreContainer" class="mt-16 text-center hidden">
                        <button id="btnLoadMore" class="btn-pokedex">
                            Carregar Mais Pokémon
                        </button>
                        <p id="loadMoreStatus" class="mt-4 text-xs font-bold text-gray-300 uppercase tracking-widest"></p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="mt-20"></footer>
    </div>

    <!-- Scripts -->
    <script src="js/navigation.js"></script>
    <script src="js/variaveis.js"></script>
    <script src="js/api.js"></script>
    <script src="js/autocomplete.js"></script>
    <script src="js/main.js"></script>
    <script src="js/move.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KADEX | Detalhes da Habilidade</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pokedex: {
                            red: '#E3350D',
                            'red-dark': '#B32506',
                            'red-light': '#FF5A35',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/types.css">

    <style type="text/tailwindcss">
        @layer components {
            .glass-panel {
                @apply bg-white/70 backdrop-blur-md border border-white/50 shadow-xl rounded-3xl;
            }
            .btn-pokedex {
                @apply bg-pokedex-red hover:bg-pokedex-red-dark text-white font-bold py-3 px-8 rounded-2xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-pokedex-red/30 disabled:opacity-50 disabled:cursor-not-allowed;
            }
            .input-pokedex {
                @apply bg-white/80 border-2 border-transparent focus:border-pokedex-red focus:bg-white outline-none rounded-2xl px-6 py-3 w-full transition-all duration-300 shadow-inner;
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <div class="fixed top-0 left-0 w-full h-[400px] bg-gradient-to-b from-pokedex-red/10 to-transparent -z-10 pointer-events-none"></div>

    <div class="max-w-6xl mx-auto px-4">
        <header></header>

        <main class="space-y-8">
            <!-- Loading State -->
            <div id="loadingState" class="animate-pulse space-y-6">
                <div class="glass-panel p-8 h-48 bg-gray-200"></div>
                <div class="glass-panel p-8 h-96 bg-gray-200"></div>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden glass-panel p-12 text-center space-y-4">
                <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800">Ops! Habilidade não encontrada.</h3>
                <p class="text-gray-500">Não conseguimos localizar os detalhes desta habilidade. Verifique o nome e tente novamente.</p>
                <a href="index.html" class="inline-block px-6 py-2 bg-pokedex-red text-white font-bold rounded-xl shadow-lg shadow-pokedex-red/20">Voltar para a Home</a>
            </div>

            <!-- Content State -->
            <div id="contentState" class="hidden space-y-8">
                <!-- Info Section -->
                <div class="glass-panel p-8 md:p-10">
                    <div class="space-y-8">
                        <div>
                            <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-pokedex-red mb-3">Efeito Curto</h4>
                            <p id="efeitoCurto" class="text-lg font-bold text-gray-700 leading-relaxed"></p>
                        </div>
                        <div class="pt-8 border-t border-gray-100">
                            <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-3">Efeito Detalhado</h4>
                            <p id="efeitoLongo" class="text-sm text-gray-500 leading-relaxed"></p>
                        </div>
                    </div>
                </div>

                <!-- Pokémon Section -->
                <div class="glass-panel p-8">
                    <h4 class="text-xl font-extrabold mb-8 flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-pokedex-red rounded-full"></span>
                        Pokémon com esta Habilidade
                    </h4>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] uppercase font-black text-gray-400 tracking-[0.2em] border-b border-gray-100">
                                    <th class="pb-4 px-4 text-center">Nº</th>
                                    <th class="pb-4 px-4">Pokémon</th>
                                    <th class="pb-4 px-4">Tipos</th>
                                    <th class="pb-4 px-4 text-center">Slot</th>
                                </tr>
                            </thead>
                            <tbody id="listaPokemonsHabilidade" class="divide-y divide-gray-50">
                                <!-- Injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-20"></footer>
    </div>

    <!-- Scripts -->
    <script src="js/navigation.js"></script>
    <script src="js/variaveis.js"></script>
    <script src="js/api.js"></script>
    <script src="js/autocomplete.js"></script>
    <script src="js/main.js"></script>
    <script src="js/ability.js"></script>
</body>
</html>
